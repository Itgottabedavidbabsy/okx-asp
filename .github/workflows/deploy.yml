name: Deploy OKX.AI ASP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint + Type-check ─────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: cd backend  && npm ci
      - run: cd frontend && npm ci
      - run: |
          cd backend
          npx prisma generate
          echo "Backend validates OK"

  # ── Deploy Frontend to Vercel ──────────────────────────────────
  # Note: Vercel's own GitHub integration already auto-deploys on push to
  # main, so this job is a secondary/backup path — it uses the Vercel CLI
  # directly with the repo secrets below. Frontend build variables come
  # from frontend/.env.production (committed, non-sensitive backend URLs),
  # not from secrets, so nothing here overrides those.
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install -g vercel
      - run: cd frontend && npm ci && npm run build
      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_TEAM_ID }} \
            --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # Backend deploys are handled by Render's own GitHub integration
  # (auto-deploys on push to main) — no Actions job needed for it.
